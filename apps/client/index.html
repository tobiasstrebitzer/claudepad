<!doctype html>
<html lang="en" data-theme="light" data-viewer-theme="warm">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="referrer" content="no-referrer" />
    <title>claudepad</title>
    <!-- No-flash appearance: resolve the persisted light/dark mode AND the
         aesthetic palette before first paint, so neither axis flashes. -->
    <script>
      (function () {
        var el = document.documentElement;
        try {
          var t = localStorage.getItem('claudepad.theme') || 'system';
          var dark =
            t === 'dark' ||
            (t === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
          el.setAttribute('data-theme', dark ? 'dark' : 'light');
        } catch (e) {
          el.setAttribute('data-theme', 'light');
        }
        try {
          var p = localStorage.getItem('claudepad.viewer-theme');
          el.setAttribute(
            'data-viewer-theme',
            p === 'slate' || p === 'ocean' || p === 'contrast' ? p : 'warm'
          );
        } catch (e) {
          el.setAttribute('data-viewer-theme', 'warm');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
